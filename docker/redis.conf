# TiOLi AGENTIS — Redis configuration for self-hosted deployment

# Memory limit (256MB for small instances)
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence
save 900 1
save 300 10
save 60 10000

# Append-only file for durability
appendonly yes
appendfsync everysec

# Logging
loglevel notice
