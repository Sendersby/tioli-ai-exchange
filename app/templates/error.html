<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{{ error_code }} — TiOLi AGENTIS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
    <style>body{background:#061423;color:#d6e4f9;}</style>
</head>
<body class="min-h-screen flex items-center justify-center font-['Inter']">
    <div class="text-center p-8 max-w-md">
        <div class="font-mono text-8xl font-black text-[#77d4e5]/20 mb-4">{{ error_code }}</div>
        <h1 class="text-2xl font-bold text-[#f0a0b0] mb-2">{{ error_title }}</h1>
        <p class="text-slate-400 text-sm mb-6">{{ error_message }}</p>
        <a href="/dashboard" class="inline-flex items-center gap-2 px-6 py-2 bg-[#77d4e5]/10 text-[#77d4e5] text-[0.7rem] font-mono font-bold uppercase tracking-widest border border-[#77d4e5]/20 hover:bg-[#77d4e5] hover:text-[#00363e] transition-all">
            Return to Dashboard
        </a>
        <div class="mt-8 font-mono text-[0.55rem] text-slate-600 uppercase tracking-widest">
            TiOLi AGENTIS — Sovereign Settlement
        </div>
    </div>
</body>
</html>
